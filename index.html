<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Socket.IO Chat</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");

      :root {
        --bg-1: #0f172a;
        --bg-2: #0b1023;
        --accent: #22d3ee;
        --accent-2: #a3e635;
        --card: rgba(15, 23, 42, 0.75);
        --border: rgba(148, 163, 184, 0.25);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --bubble-sent: linear-gradient(120deg, #22d3ee, #38bdf8);
        --bubble-recv: rgba(30, 41, 59, 0.8);
        --shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", system-ui, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% 10%, #1e293b 0%, transparent 45%),
          radial-gradient(circle at 80% 20%, #0ea5e9 0%, transparent 35%),
          linear-gradient(180deg, var(--bg-1), var(--bg-2));
      }

      .bg-glow {
        position: fixed;
        inset: -20% -10% auto auto;
        width: 50vw;
        height: 50vw;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.25), transparent 70%);
        filter: blur(40px);
        z-index: 0;
        pointer-events: none;
      }

      .app {
        position: relative;
        z-index: 1;
        max-width: 900px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 2rem 1.5rem 1.5rem;
        gap: 1.5rem;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.25rem 1.5rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        -webkit-backdrop-filter: blur(16px);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .brand-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 0 12px rgba(34, 211, 238, 0.7);
      }

      .brand-title {
        font-weight: 700;
        letter-spacing: 0.5px;
      }

      .brand-sub {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .status {
        padding: 0.35rem 0.8rem;
        border-radius: 999px;
        font-size: 0.85rem;
        background: rgba(148, 163, 184, 0.15);
        color: var(--muted);
        border: 1px solid var(--border);
        transition: all 0.2s ease;
      }

      .status.online {
        color: #0f172a;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
        border-color: transparent;
      }

      .chat {
        flex: 1;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 1.5rem;
        box-shadow: var(--shadow);
        -webkit-backdrop-filter: blur(18px);
        backdrop-filter: blur(18px);
        overflow: hidden;
        display: flex;
      }

      #messages {
        list-style-type: none;
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-y: auto;
        max-height: 60vh;
      }

      #messages > li {
        padding: 0.6rem 0.9rem;
        margin-bottom: 0.75rem;
        max-width: 70%;
        border-radius: 14px;
        word-wrap: break-word;
        display: inline-block;
        clear: both;
        animation: fadeIn 0.2s ease;
      }

      .sent {
        background: var(--bubble-sent);
        color: #0b1023;
        float: right;
        text-align: right;
        box-shadow: 0 10px 25px rgba(34, 211, 238, 0.25);
      }

      .received {
        background: var(--bubble-recv);
        color: var(--text);
        float: left;
        text-align: left;
        border: 1px solid rgba(148, 163, 184, 0.2);
      }

      #form {
        display: flex;
        gap: 0.75rem;
        padding: 0.75rem;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        box-shadow: var(--shadow);
        -webkit-backdrop-filter: blur(16px);
        backdrop-filter: blur(16px);
      }

      #input {
        border: 1px solid transparent;
        padding: 0 1rem;
        flex-grow: 1;
        border-radius: 999px;
        min-width: 0;
        background: rgba(15, 23, 42, 0.5);
        color: var(--text);
        font-size: 1rem;
        height: 3rem;
        transition: border 0.2s ease, box-shadow 0.2s ease;
      }

      #input:focus {
        outline: none;
        border-color: rgba(34, 211, 238, 0.8);
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
      }

      #form > button {
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
        border: none;
        padding: 0 1.4rem;
        border-radius: 999px;
        outline: none;
        color: #0b1023;
        font-weight: 600;
        letter-spacing: 0.2px;
        cursor: pointer;
        height: 3rem;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      #form > button:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(34, 211, 238, 0.25);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 720px) {
        .app {
          padding: 1.25rem 1rem 1rem;
          gap: 1rem;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.5rem;
        }

        #messages {
          max-height: 55vh;
        }

        #messages > li {
          max-width: 85%;
        }

        #form {
          padding: 0.6rem;
        }

        #input {
          height: 2.8rem;
        }

        #form > button {
          height: 2.8rem;
          padding: 0 1rem;
        }
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        padding: 1.5rem;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }

      .overlay-card {
        width: min(420px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.75rem;
        box-shadow: var(--shadow);
      }

      .overlay h2 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }

      .overlay p {
        margin: 0 0 1rem;
        color: var(--muted);
      }

      .overlay input {
        width: 100%;
        height: 3rem;
        border-radius: 999px;
        border: 1px solid transparent;
        background: rgba(15, 23, 42, 0.5);
        color: var(--text);
        padding: 0 1rem;
        font-size: 1rem;
      }

      .overlay input:focus {
        outline: none;
        border-color: rgba(34, 211, 238, 0.8);
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
      }

      .overlay button {
        margin-top: 0.75rem;
        width: 100%;
        height: 3rem;
        border: none;
        border-radius: 999px;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
        color: #0b1023;
        font-weight: 600;
        cursor: pointer;
      }

      .overlay .error {
        margin-top: 0.75rem;
        color: #f87171;
        font-size: 0.9rem;
        min-height: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>
    <div class="overlay" id="auth-overlay">
      <div class="overlay-card">
        <h2>Enter Chat Password</h2>
        <p>Ask the admin for the shared password to join.</p>
        <form id="auth-form">
          <input id="auth-input" type="password" placeholder="Password" required />
          <button type="submit">Enter Chat</button>
          <div class="error" id="auth-error"></div>
        </form>
      </div>
    </div>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-dot"></span>
          <div>
            <div class="brand-title">Realtime Chat</div>
            <div class="brand-sub">Socket.IO • Vercel + Render</div>
          </div>
        </div>
        <div>
          <div class="status" id="status">Offline</div>
          <div class="brand-sub" id="online-count">0 online</div>
        </div>
      </header>
      <section class="chat">
        <ul id="messages"></ul>
      </section>
      <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button type="submit">Send</button>
      </form>
    </main>

    <script src="https://chat-backend-3iqe.onrender.com/socket.io/socket.io.js"></script>
    <script>
      let socket;
      const status = document.getElementById("status");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const onlineCount = document.getElementById("online-count");
      const authOverlay = document.getElementById("auth-overlay");
      const authForm = document.getElementById("auth-form");
      const authInput = document.getElementById("auth-input");
      const authError = document.getElementById("auth-error");

      let mySocketId = null;

      function connectSocket(password) {
        socket = io("https://chat-backend-3iqe.onrender.com", {
          auth: { password },
        });

        socket.on("connect", () => {
          mySocketId = socket.id;
          status.textContent = "Online";
          status.classList.add("online");
          authOverlay.style.display = "none";
        });

        socket.on("connect_error", (err) => {
          authError.textContent = err.message || "Connection failed";
        });

        socket.on("disconnect", () => {
          status.textContent = "Offline";
          status.classList.remove("online");
          authOverlay.style.display = "flex";
        });

        socket.on("online users", (count) => {
          onlineCount.textContent = `${count} online`;
        });

        socket.on("chat message", (msg) => {
          const item = document.createElement("li");
          item.textContent = msg.text;

          if (msg.id === mySocketId) {
            item.classList.add("sent");
          } else {
            item.classList.add("received");
          }

          messages.appendChild(item);
          item.scrollIntoView({ behavior: "smooth", block: "end" });
        });
      }

      authForm.addEventListener("submit", (e) => {
        e.preventDefault();
        authError.textContent = "";
        const password = authInput.value.trim();
        if (!password) {
          authError.textContent = "Password is required";
          return;
        }
        connectSocket(password);
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || !socket) {
          return;
        }
        socket.emit("chat message", {
          id: mySocketId,
          text: text,
        });
        input.value = "";
      });
    </script>
  </body>
</html>
