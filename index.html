<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Socket.IO Chat</title>
    <style>
      body {
        margin: 0;
        padding-bottom: 3rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }

      #form {
        background: rgba(0, 0, 0, 0.15);
        padding: 0.25rem;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        display: flex;
        height: 3rem;
        box-sizing: border-box;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }

      #input {
        border: none;
        padding: 0 1rem;
        flex-grow: 1;
        border-radius: 2rem;
        margin: 0.25rem;
      }

      #input:focus {
        outline: none;
      }

      #form > button {
        background: #333;
        border: none;
        padding: 0 1rem;
        margin: 0.25rem;
        border-radius: 3px;
        outline: none;
        color: #fff;
      }

      #messages {
        list-style-type: none;
        margin: 0;
        padding: 1rem;
        padding-bottom: 4rem;
      }

      #messages > li {
        padding: 0.5rem 1rem;
        margin-bottom: 0.5rem;
        max-width: 70%;
        border-radius: 10px;
        word-wrap: break-word;
        display: inline-block;
        clear: both;
      }

      .sent {
        background-color: #dcf8c6;
        float: right;
        text-align: right;
      }

      .received {
        background-color: #ffffff;
        float: left;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="Type a message..." /><button type="submit">Send</button>
    </form>

    <script src="https://YOUR-BACKEND-DOMAIN/socket.io/socket.io.js"></script>
    <script>
      const socket = io("https://YOUR-BACKEND-DOMAIN");
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");

      let mySocketId = null;

      // Get your own socket ID when connected
      socket.on("connect", () => {
        mySocketId = socket.id;
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (text) {
          // Send message with your socket ID
          socket.emit("chat message", {
            id: mySocketId,
            text: text,
          });
          input.value = "";
        }
      });

      socket.on("chat message", (msg) => {
        const item = document.createElement("li");
        item.textContent = msg.text;

        if (msg.id === mySocketId) {
          item.classList.add("sent");
        } else {
          item.classList.add("received");
        }

        messages.appendChild(item);
        window.scrollTo(0, document.body.scrollHeight);
      });
    </script>
  </body>
</html>
